<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css?v=1.1" />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <meta name="robots" content="noindex, nofollow" />
        <title>Venta Rôleplay</title>
    </head>

    <body>
        <div class="preview-container" id="previewContainer">
            <p class="preview-main-text">Cliquez n'importe où sur l'écran pour lancer la preview</p>
            <p class="preview-sub-text">Pour un rendu optimal, testez sur un écran d'ordinateur.</p>
            <p class="preview-watermark" id="previewWatermark"></p>
        </div>

        <div class="splash-container" id="splashContainer">
            <img src="background/image.png?v=1.1" draggable="false" id="splash-img" alt="Logo Venta" />
        </div>

        <div class="background-container" id="backgroundContainer">
            <canvas class="background-video ambient" id="backgroundVideoAmbient"></canvas>
            <video
                class="background-video main"
                id="backgroundVideo"
                src="background/video.mp4?v=1.1"
                muted
                loop
            ></video>
            <div class="background-overlay" id="backgroundOverlay"></div>
        </div>

        <div class="main-container" id="mainContainer">
            <div class="music-player-container" id="musicPlayerContainer">
                <div class="music-info">
                    <img class="song-icon" id="songIcon" />
                    <div class="song-meta">
                        <p class="song-title" id="songTitle">Chargement...</p>
                        <p class="song-artist" id="songArtist"></p>
                    </div>
                </div>
                <div class="music-controls">
                    <button class="control-btn" id="prevBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                        </svg>
                    </button>
                    <button class="control-btn" id="playPauseBtn">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </button>
                    <button class="control-btn" id="nextBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                        </svg>
                    </button>
                    <div class="volume-control">
                        <input type="range" id="volumeSlider" min="0" max="100" value="15" class="volume-slider" />
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="separator"> / </span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>
            </div>

            <div class="left-container" id="leftContainer">
                <p class="title" id="title"></p>
            </div>

            <div class="logo-container" id="logoContainer">
                <img src="logo.png?v=1.1" alt="Logo du serveur" draggable="false" />
            </div>

            <progress class="loading-bar" id="loadingBar" value="0" max="1"></progress>
        </div>

        <script src="config.js?v=1.1"></script>
        <script src="script.js?v=1.1"></script>
    </body>
</html>
